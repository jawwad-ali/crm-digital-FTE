<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Example — Customer Support Widget</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { color: #1f2937; }
    p { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Customer Support Widget</h1>
  <p>The support form below is loaded in an iframe from <code>/embed</code>.</p>
  <iframe
    src="http://localhost:3000/embed"
    width="100%"
    height="600"
    style="border: 1px solid #e5e7eb; border-radius: 8px;"
    title="Customer Support"
  ></iframe>
</body>
</html>
